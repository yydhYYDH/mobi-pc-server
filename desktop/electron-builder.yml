appId: com.waic.pc-mnn-server
productName: 数据归家
executableName: DataHome
directories:
  output: release
files:
  - dist/**/*
  - package.json
asar: true
extraResources:
  - from: resources/frontend
    to: frontend
  - from: resources/configs
    to: configs
  - from: resources/backend
    to: backend
  - from: resources/mnn
    to: mnn
    filter:
      - "**/*"
  - from: resources/llama-cpp
    to: llama-cpp
    filter:
      - "**/*"
  - from: resources/hdc
    to: hdc
    filter:
      - "**/*"
win:
  icon: build/icon.ico
  target:
    - nsis
  artifactName: "DataHome-${version}-${os}-${arch}.${ext}"
nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
linux:
  icon: build/icon.png
  target:
    - AppImage
    - dir
  artifactName: "DataHome-${version}-${os}-${arch}.${ext}"
