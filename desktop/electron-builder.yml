appId: com.waic.pc-mnn-server
productName: 你的智伴
executableName: ClawMate
directories:
  output: release
files:
  - dist/**/*
  - package.json
asar: true
afterPack: scripts/after-pack.js
extraResources:
  - from: ${env.PC_SERVER_DESKTOP_RESOURCES}/frontend
    to: frontend
  - from: ${env.PC_SERVER_DESKTOP_RESOURCES}/configs
    to: configs
  - from: ${env.PC_SERVER_DESKTOP_RESOURCES}/example-images
    to: example-images
  - from: ${env.PC_SERVER_DESKTOP_RESOURCES}/backend
    to: backend
  - from: ${env.PC_SERVER_DESKTOP_RESOURCES}/mobiinfer
    to: mobiinfer
    filter:
      - "**/*"
  - from: ${env.PC_SERVER_DESKTOP_RESOURCES}/llama-cpp
    to: llama-cpp
    filter:
      - "**/*"
  - from: ${env.PC_SERVER_DESKTOP_RESOURCES}/hdc
    to: hdc
    filter:
      - "**/*"
win:
  icon: build/icon.ico
  target:
    - nsis
  artifactName: "ClawMate-${version}-${os}-${arch}.${ext}"
mac:
  icon: build/icon.icns
  category: public.app-category.developer-tools
  identity: null
  target:
    - dmg
    - zip
  artifactName: "ClawMate-${version}-${os}-${arch}.${ext}"
nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
linux:
  icon: build/icon.png
  target:
    - AppImage
    - dir
  artifactName: "ClawMate-${version}-${os}-${arch}.${ext}"
